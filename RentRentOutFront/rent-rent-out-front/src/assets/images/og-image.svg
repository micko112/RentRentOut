<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d0a2d"/>
      <stop offset="55%" style="stop-color:#5a1a5a"/>
      <stop offset="100%" style="stop-color:#813181"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6ecf7e"/>
      <stop offset="100%" style="stop-color:#4ab85a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="105" x2="1200" y2="105" stroke="white" stroke-width="1"/>
    <line x1="0" y1="210" x2="1200" y2="210" stroke="white" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="white" stroke-width="1"/>
    <line x1="0" y1="420" x2="1200" y2="420" stroke="white" stroke-width="1"/>
    <line x1="0" y1="525" x2="1200" y2="525" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="white" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="white" stroke-width="1"/>
  </g>

  <!-- Decorative circles (blurred background shapes) -->
  <circle cx="980" cy="120" r="200" fill="#813181" opacity="0.35"/>
  <circle cx="1100" cy="500" r="150" fill="#6ecf7e" opacity="0.08"/>
  <circle cx="80" cy="520" r="120" fill="#813181" opacity="0.2"/>

  <!-- Left accent bar -->
  <rect x="80" y="180" width="6" height="270" rx="3" fill="url(#accent)"/>

  <!-- Icon group: house + arrows (exchange) -->
  <!-- House shape -->
  <g transform="translate(108, 195)">
    <!-- House roof -->
    <polygon points="50,0 100,45 0,45" fill="none" stroke="#6ecf7e" stroke-width="4" stroke-linejoin="round"/>
    <!-- House body -->
    <rect x="12" y="45" width="76" height="58" rx="3" fill="none" stroke="#6ecf7e" stroke-width="4"/>
    <!-- Door -->
    <rect x="36" y="68" width="28" height="35" rx="2" fill="none" stroke="#6ecf7e" stroke-width="3"/>
    <!-- Exchange arrows -->
    <g transform="translate(108, 20)">
      <!-- Arrow right -->
      <path d="M0,15 L30,15 M22,7 L30,15 L22,23" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/>
      <!-- Arrow left -->
      <path d="M40,35 L10,35 M18,27 L10,35 L18,43" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/>
    </g>
  </g>

  <!-- Main title -->
  <text x="108" y="390"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="78"
        font-weight="800"
        fill="white"
        letter-spacing="-1">Izdajem</text>
  <text x="108" y="474"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="78"
        font-weight="800"
        fill="url(#accent)"
        letter-spacing="-1">Iznajmljujem</text>

  <!-- Tagline -->
  <text x="112" y="528"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="24"
        fill="white"
        opacity="0.65"
        letter-spacing="0.3">Iznajmi sve što ti treba · Besplatno objavi oglas</text>

  <!-- Bottom domain pill -->
  <rect x="108" y="558" width="330" height="44" rx="22" fill="white" opacity="0.1"/>
  <text x="273" y="585"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="18"
        fill="white"
        opacity="0.85"
        text-anchor="middle"
        letter-spacing="0.5">izdajemiznajmljujem.com</text>

  <!-- Right side decorative cards -->
  <g opacity="0.12">
    <rect x="780" y="200" width="340" height="85" rx="12" fill="white"/>
    <rect x="780" y="305" width="340" height="85" rx="12" fill="white"/>
    <rect x="780" y="410" width="340" height="85" rx="12" fill="white"/>
  </g>
  <g opacity="0.06">
    <rect x="800" y="218" width="200" height="14" rx="7" fill="white"/>
    <rect x="800" y="242" width="140" height="10" rx="5" fill="white"/>
    <rect x="800" y="323" width="180" height="14" rx="7" fill="white"/>
    <rect x="800" y="347" width="120" height="10" rx="5" fill="white"/>
    <rect x="800" y="428" width="220" height="14" rx="7" fill="white"/>
    <rect x="800" y="452" width="100" height="10" rx="5" fill="white"/>
  </g>
</svg>
