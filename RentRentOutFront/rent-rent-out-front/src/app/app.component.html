<app-header (openMobileMenuEvent)="mobileMenuOpen = true"></app-header>
<app-navbar></app-navbar>

<!-- Mobile search bar (ispod headera, sticky, ≤768px) -->
<div class="mobile-search-bar" *ngIf="showSidebar$ | async">
  <div class="msb-input-wrap">
    <span class="material-icons msb-search-icon">search</span>
    <input type="text"
           class="msb-input"
           placeholder="Pretraži oglase..."
           #msbInput
           (keyup.enter)="onMobileSearch(msbInput.value)">
  </div>
  <button class="msb-filter-btn" (click)="triggerMobileFilter()" title="Filteri">
    <span class="material-icons">tune</span>
  </button>
</div>

<div class="main-app-wrapper"
     [class.has-sidebar]="showSidebar$ | async"
     [class.is-admin]="isAdmin$ | async"
     [class.sidebar-collapsed]="sidebarCollapsed$ | async">
  <app-sidebar *ngIf="showSidebar$ | async"></app-sidebar>
  <main class="page-content">
    <router-outlet></router-outlet>
  </main>
</div>

<!-- Mobile sidebar overlay (desna strana, ≤768px) -->
<div class="mobile-sidebar-overlay"
     [class.open]="mobileMenuOpen"
     (click)="mobileMenuOpen = false"
     *ngIf="showSidebar$ | async">
  <div class="mobile-sidebar-panel" (click)="$event.stopPropagation()">
    <app-sidebar
      *ngIf="mobileMenuOpen"
      [mobileDrawer]="true"
      (closeDrawer)="mobileMenuOpen = false">
    </app-sidebar>
  </div>
</div>

<nav class="mobile-nav" *ngIf="showSidebar$ | async">
  <a class="mobile-nav-item" routerLink="/ads" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
    <span class="material-icons">home</span>
    <span class="mobile-nav-label">Početna</span>
  </a>
  <a class="mobile-nav-item" routerLink="/user/saved-ads" routerLinkActive="active">
    <span class="material-icons">bookmark_border</span>
    <span class="mobile-nav-label">Sačuvano</span>
  </a>
  <a class="mobile-nav-item mobile-nav-create" routerLink="/ads/create">
    <span class="material-icons">add</span>
  </a>
  <a class="mobile-nav-item" routerLink="/messages" routerLinkActive="active">
    <span class="mobile-nav-icon-wrap">
      <span class="material-icons">forum</span>
      <span class="mobile-nav-badge" *ngIf="(chatUnread$ | async) as n">{{ n > 99 ? '99+' : n }}</span>
    </span>
    <span class="mobile-nav-label">Poruke</span>
  </a>
  <a class="mobile-nav-item" routerLink="/user/me" routerLinkActive="active">
    <span class="material-icons">person</span>
    <span class="mobile-nav-label">Nalog</span>
  </a>
</nav>

<app-cookie-banner></app-cookie-banner>
<app-toast></app-toast>
<app-support-widget *ngIf="!(isAdmin$ | async)"></app-support-widget>
<app-footer></app-footer>
