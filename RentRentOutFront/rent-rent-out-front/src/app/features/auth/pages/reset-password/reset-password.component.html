<div class="form-container">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="title">
      <h2>Nova lozinka</h2>
    </div>

    <div *ngIf="successMessage" class="success-msg">{{ successMessage }}</div>
    <div *ngIf="errorMessage && !successMessage" class="error-box">{{ errorMessage }}</div>

    <ng-container *ngIf="!successMessage && token">
      <div class="form-field">
        <label for="newPassword">Nova lozinka</label>
        <input id="newPassword" type="password" formControlName="newPassword" placeholder="Min. 6 znakova" />
        <div *ngIf="form.get('newPassword')?.touched && form.get('newPassword')?.invalid" class="error-msg">
          Lozinka mora imati najmanje 6 znakova.
        </div>
      </div>

      <div class="form-field">
        <label for="confirmPassword">Potvrdi lozinku</label>
        <input id="confirmPassword" type="password" formControlName="confirmPassword" placeholder="Ponovi lozinku" />
        <div *ngIf="form.touched && form.errors?.['mismatch']" class="error-msg">
          Lozinke se ne poklapaju.
        </div>
      </div>

      <div class="btn-reg">
        <button type="submit" [disabled]="form.invalid">Postavi lozinku</button>
      </div>
    </ng-container>

    <hr />
    <p class="register-link"><a routerLink="/login">Nazad na prijavu</a></p>
  </form>
</div>
