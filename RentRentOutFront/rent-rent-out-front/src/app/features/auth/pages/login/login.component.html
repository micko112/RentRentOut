
<div class="form-container">
  <form [formGroup]="form" (ngSubmit)="login()">
    <div class="title">
      <h2>Prijava</h2>
    </div>

    <button type="button" class="social-btn google-btn-custom" (click)="triggerGoogleLogin()">
      <svg class="g-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.4-.4-3.5z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 18.9 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
        <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2c-2 1.5-4.5 2.4-7.2 2.4-5.2 0-9.6-3.3-11.3-7.9l-6.5 5C9.6 39.6 16.2 44 24 44z"/>
        <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.2 4.3-4.1 5.6l6.2 5.2C41 35.3 44 30 44 24c0-1.3-.1-2.4-.4-3.5z"/>
      </svg>
      Nastavi sa Google nalogom
    </button>

    <button type="button" class="social-btn facebook-btn" (click)="loginWithFacebook()">
      <svg class="fb-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white">
        <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.514c-1.491 0-1.956.93-1.956 1.886v2.267h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
      </svg>
      Nastavi sa Facebookom
    </button>

    <div class="divider"><span>ili se prijavi sa emailom</span></div>

    <div class="form-field">
      <label for="email" >Email</label>
      <input id="email" formControlName="email" placeholder="Email" autocomplete="email">
      <div *ngIf="submitted && form.get('email')?.invalid" class="error-msg">
        Unesite validan email.
      </div>
    </div>
    <div class="form-field">
      <label for="password" >Lozinka</label>
      <input id="password" type="password" formControlName="password" placeholder="Lozinka" autocomplete="current-password">
      <div *ngIf="form.get('password')?.touched && form.get('password')?.invalid" class="error-msg">
        Unesite ispravnu lozinku.
      </div>
    </div>
    <div class="checkbox-forgot-password">
      <div class="checkbox">
        <input id="remember" type="checkbox">
        <label for="remember" >Zapamti me</label>
      </div>
      <a routerLink="/forgot-password" class="forgot-link">Zaboravljena lozinka?</a>
    </div>

    <div class="btn-reg">
      <button type="submit" [disabled]="form.invalid">Prijavi se</button>
    </div>

    <p class="register-link">Nemaš nalog? <a routerLink="/register">Registruj se</a></p>
    <div id="google-btn" style="display:none"></div>

  </form>
</div>
