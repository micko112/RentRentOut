<div class="form-container">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="title">
      <h2>Zaboravljena lozinka</h2>
      <p class="subtitle">Unesite email adresu i poslaćemo Vam link za resetovanje lozinke.</p>
    </div>

    <div *ngIf="successMessage" class="success-msg">{{ successMessage }}</div>
    <div *ngIf="errorMessage" class="error-msg">{{ errorMessage }}</div>

    <div class="form-field" *ngIf="!submitted">
      <label for="email">Email</label>
      <input id="email" formControlName="email" placeholder="Email" type="email" />
      <div *ngIf="form.get('email')?.touched && form.get('email')?.invalid" class="error-msg">
        Unesite validan email.
      </div>
    </div>

    <div class="btn-reg" *ngIf="!submitted">
      <button type="submit" [disabled]="form.invalid">Pošalji</button>
    </div>

    <hr />
    <p class="register-link"><a routerLink="/login">Nazad na prijavu</a></p>
  </form>
</div>
