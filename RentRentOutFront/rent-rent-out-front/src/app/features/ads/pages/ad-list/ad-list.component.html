
<div class="container page-layout">
  <aside class="filters-sidebar">
    <app-filters-sidebar (categorySelected)="onCategoryFiltered($event)">

    </app-filters-sidebar>
  </aside>
  <main class="ads-grid-section">
      <h1>Svi oglasi</h1>
      <ng-container *ngIf="adsPage$ | async as adsPage">
        <div class="grid">
          <app-ad-card *ngFor="let ad of adsPage.content" [ad]="ad">
          </app-ad-card>
        </div>
      </ng-container>
  </main>

</div>
