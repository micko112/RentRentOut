
<div class="listing-card" [ngClass]="{'list-view': viewMode === 'list'}" [routerLink]="['/ads', ad.id]">
  <div class="image-wrapper">
    <img [src]="imageUrl"
         (error)="handleImageError($event)"
         alt="{{ ad.title }}" style="">
  </div>

  <div class="listing-info">
    <a class="listing-title">{{ ad.title }}</a>
    <div class="listing-location">{{ ad.city }}, {{ ad.municipality }}</div>

    <div class="price-tag">
      <div class="listing-price">{{ ad.price | number: '1.0-0' }}</div>
      <div class="currency">{{ ad.currency }}</div>
      <div class="currency-interval">
        <!-- <span class="currency" *ngIf="ad.currency === 'EUR'">€</span> -->
        <span class="interval">{{ intervalMap[ad.priceInterval] || ad.priceInterval }}</span>

      </div>
    </div>
  </div>
</div>
