<div class="sidebar-wrapper">

  <!-- HEADER -->
  <div class="sidebar-header">
    <h2 class="sidebar-title">
      <span class="material-icons">tune</span>
      Filteri
    </h2>
    <button class="btn-clear-header" *ngIf="activeFilterCount > 0" (click)="clearAll()">
      Poništi sve
    </button>
  </div>

  <div class="sidebar-content">

    <!-- 1. KLJUČNA REČ -->
    <section class="filter-group">
      <label class="group-label">Pretraga</label>
      <div class="search-input-wrap">
        <span class="material-icons si-icon">search</span>
        <input type="text" class="search-text-input" placeholder="npr. Hilti, kamera..."
               [(ngModel)]="filters.keyword" name="keyword" (ngModelChange)="onFilterChange()" />
        <button class="si-clear" *ngIf="filters.keyword" (click)="filters.keyword = ''">
          <span class="material-icons">close</span>
        </button>
      </div>
    </section>

    <!-- 2. KATEGORIJA -->
    <section class="filter-group">
      <label class="group-label">Kategorija</label>
      <div class="select-wrap">
        <span class="material-icons select-icon">category</span>
        <select class="custom-select" [(ngModel)]="filters.categoryId" name="categoryId" (ngModelChange)="onFilterChange()">
          <option [ngValue]="undefined">Sve kategorije</option>
          <option *ngFor="let c of categories" [ngValue]="c.id">{{ c.name }}</option>
        </select>
      </div>
    </section>

    <!-- 3. LOKACIJA -->
    <section class="filter-group">
      <label class="group-label">Grad</label>
      <app-city-picker
        #cityPicker
        [locations]="locations"
        [allowCityOnly]="true"
        placeholder="Svi gradovi"
        [initialLocationId]="initialLocationId"
        (selectionChange)="onCityChange($event)">
      </app-city-picker>
    </section>

    <!-- 4. TIP CENE -->
    <section class="filter-group">
      <label class="group-label">Tip zakupa</label>
      <div class="interval-chips">
        <button *ngFor="let opt of intervalOptions"
                class="interval-chip"
                [class.active]="filters.priceInterval === opt.value"
                (click)="toggleInterval(opt.value)">
          {{ opt.label }}
        </button>
      </div>
    </section>

    <!-- 5. CENA -->
    <section class="filter-group">
      <label class="group-label">Raspon cene</label>
      <div class="price-row">
        <div class="price-input-wrap">
          <input type="number" class="price-input" placeholder="Od" [(ngModel)]="filters.minPrice" name="minPrice" min="0" (ngModelChange)="onFilterChange()" />
        </div>
        <span class="price-dash">—</span>
        <div class="price-input-wrap">
          <input type="number" class="price-input" placeholder="Do" [(ngModel)]="filters.maxPrice" name="maxPrice" min="0" (ngModelChange)="onFilterChange()" />
        </div>
      </div>
    </section>

    <!-- 6. AKCIJE -->
    <div class="sidebar-actions">
      <button class="btn-apply" (click)="onSubmit()">
        <span class="material-icons">search</span>
        Prikaži oglase
        <span class="filter-badge" *ngIf="previewCount !== null">{{ previewCount }}</span>
      </button>
    </div>

  </div>
</div>
