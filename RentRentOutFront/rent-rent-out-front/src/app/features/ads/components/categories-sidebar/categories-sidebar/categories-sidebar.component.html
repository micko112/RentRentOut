<div class="filters-container">

  <div class="filter-section">
    <h4 class="filter-title">Kategorije</h4>

    <div class="category-list">
      <a class="category-item"
         [class.active]="selectedCategoryId === null"
         (click)="onCategoryClick(null)">
        Sve kategorije
      </a>

      <ng-container *ngFor="let parent of parentCategories">
        <a class="category-item category-item--parent"
           [class.active]="parent.id === selectedCategoryId"
           (click)="onCategoryClick(parent.id)">
          {{ parent.name }}
        </a>
        <ng-container *ngFor="let child of getChildren(parent.id)">
          <a class="category-item category-item--child"
             [class.active]="child.id === selectedCategoryId"
             (click)="hasGrandchildren(child.id) ? toggleExpand(child.id) : onCategoryClick(child.id)">
            {{ child.name }}
            <span class="material-icons expand-icon" *ngIf="hasGrandchildren(child.id)">
              {{ expandedLevel2Ids.has(child.id) ? 'expand_more' : 'chevron_right' }}
            </span>
          </a>
          <ng-container *ngIf="expandedLevel2Ids.has(child.id)">
            <a class="category-item category-item--grandchild"
               *ngFor="let grandchild of getGrandchildren(child.id)"
               [class.active]="grandchild.id === selectedCategoryId"
               (click)="onCategoryClick(grandchild.id)">
              {{ grandchild.name }}
            </a>
          </ng-container>
        </ng-container>
      </ng-container>
    </div>
  </div>

</div>
