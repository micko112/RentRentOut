<div class="reports-page">
  <div class="page-header">
    <h2>Prijave oglasa</h2>
    <button class="btn-filter" (click)="toggleFilter()">
      {{ onlyUnreviewed ? 'Prikaži sve' : 'Samo nepregledane' }}
    </button>
  </div>

  <div *ngIf="loading" class="loading">Učitavanje...</div>

  <div *ngIf="!loading && reports.length === 0" class="empty">
    Nema prijava. 🎉
  </div>

  <table *ngIf="!loading && reports.length > 0" class="reports-table">
    <thead>
      <tr>
        <th>Oglas</th>
        <th>Podnosilac</th>
        <th>Razlog</th>
        <th>Napomena</th>
        <th>Datum</th>
        <th>Status</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let r of reports" [class.reviewed]="r.reviewed">
        <td>
          <a [routerLink]="['/ads', r.adId]" target="_blank" class="ad-link">
            {{ r.adTitle }}
          </a>
        </td>
        <td class="reporter">{{ r.reporterName }}</td>
        <td><span class="reason-badge">{{ r.reason }}</span></td>
        <td class="note-cell">{{ r.note || '—' }}</td>
        <td class="date-cell">{{ r.createdAt | date:'dd.MM.yyyy.' }}</td>
        <td>
          <span class="status-badge" [class.reviewed]="r.reviewed">
            {{ r.reviewed ? 'Pregledano' : 'Novo' }}
          </span>
        </td>
        <td>
          <button *ngIf="!r.reviewed" class="btn-review" (click)="markReviewed(r)">
            Označi pregledano
          </button>
        </td>
      </tr>
    </tbody>
  </table>

  <div class="pagination" *ngIf="totalPages > 1">
    <button *ngFor="let p of [].constructor(totalPages); let i = index"
            [class.active]="i === page"
            (click)="goToPage(i)">{{ i + 1 }}</button>
  </div>
</div>
