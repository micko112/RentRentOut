<div class="reviews-page-container">

  <!-- ZAGLAVLJE PROFILA -->
  <div class="profile-header-card">

    <!-- Informacije o korisniku (Levo) -->
    <div class="user-info-section">
      <div class="avatar-large">
        <!-- Inicijali korisnika -->
        {{ user?.displayName | initials }}
      </div>
      <div class="details">
        <h1>{{ user?.displayName }}</h1>
        <p class="meta-info">
                    <span class="location">📍 {{ user?.locationDisplay || 'Nepoznata lokacija' }}</span>
                    <span class="member-since">📅 Član od: {{ user?.createdAt | date:'dd.mm.yyyy' }}.</span>
        </p>
      </div>
    </div>

    <!-- Ocene i akcije (Desno) -->
    <div class="review-action-panel">
      <div class="rating-score">
        <div class="score positive"><span class="icon">👍</span> {{ user?.positiveReviews || 0 }}</div>
        <div class="score negative"><span class="icon">👎</span> {{ user?.negativeReviews || 0 }}</div>
      </div>

      <!-- Prikazujemo dugme Ocenite SAMO ako NEMA contractId u URL-u -->
      <!--      <button class="btn-review" *ngIf="!contractIdToReview">Ocenite</button>-->
      <button class="btn-review"
              *ngIf="!showForm"
              (click)="toggleForm()">Ocenite
      </button>
      <!--      <button class="btn-review"-->
      <!--              (click)="createReview()">Ocenite</button>-->
    </div>
    <!-- FORMA ZA OCENJIVANJE  -->
    <div class="review-form-section">
      <app-review-form
        *ngIf="showForm"
        [contractId]="contractIdToReview"
        (reviewSaved)="onReviewSubmitted()">
      </app-review-form>
    </div>
  </div>


  <!-- TABOVI ZA FILTER OCENA -->
  <div class="review-tabs">
    <button [class.active]="activeTab === 'ALL'" (click)="setTab('ALL')">
      Sve ocene
    </button>
    <button [class.active]="activeTab === 'LESSOR'" (click)="setTab('LESSOR')">
      Kao izdavač
    </button>
    <button [class.active]="activeTab === 'LESSEE'" (click)="setTab('LESSEE')">
      Kao iznajmljivač
    </button>
    <button [class.active]="activeTypeTab === 'POSITIVE'" (click)="setTypeTab(activeTypeTab === 'POSITIVE' ? 'ALL' : 'POSITIVE')" class="type-btn positive-btn">
      👍 Pozitivne
    </button>
    <button [class.active]="activeTypeTab === 'NEGATIVE'" (click)="setTypeTab(activeTypeTab === 'NEGATIVE' ? 'ALL' : 'NEGATIVE')" class="type-btn negative-btn">
      👎 Negativne
    </button>
  </div>

  <!-- Ovde ispod će ići ngFor petlja za prikaz samih kartica sa ocenama -->
  <div class="reviews">
    <app-review-card
      *ngFor="let review of filteredReviews"
      [review]="review"
    ></app-review-card>
    <p *ngIf="filteredReviews.length === 0" style="text-align: center; color: #666; margin-top: 20px;">
      Nema ocena u ovoj kategoriji.
    </p>
  </div>
</div>
