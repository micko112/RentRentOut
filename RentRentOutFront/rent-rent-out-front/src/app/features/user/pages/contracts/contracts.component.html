<div class="contracts-page">

  <section class="contract-section">
    <div class="section-header">
      <h3 class="section-title">Dolazni zahtevi</h3>
      <span class="count-badge">{{ incomingRequests.length }}</span>
    </div>

    <div *ngIf="incomingRequests.length > 0; else noIncoming">
      <app-contract-card
        *ngFor="let contract of incomingRequests"
        [id]="'contract-' + contract.id"
        [contract]="contract"
        [isOwnerView]="true"
        (statusUpdated)="refreshData()">
      </app-contract-card>
    </div>
    <ng-template #noIncoming>
      <p class="empty-state">Nema dolaznih zahteva.</p>
    </ng-template>
  </section>

  <section class="contract-section">
    <div class="section-header">
      <h3 class="section-title">Moji zahtevi</h3>
      <span class="count-badge">{{ outgoingRequests.length }}</span>
    </div>

    <div *ngIf="outgoingRequests.length > 0; else noOutgoing">
      <app-contract-card
        *ngFor="let contract of outgoingRequests"
        [id]="'contract-' + contract.id"
        [contract]="contract"
        [isOwnerView]="false"
        (statusUpdated)="refreshData()">
      </app-contract-card>
    </div>
    <ng-template #noOutgoing>
      <p class="empty-state">Nisi poslao nijedan zahtev.</p>
    </ng-template>
  </section>

</div>
