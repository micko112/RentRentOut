<div class="contracts-page">

  <div class="search-bar">
    <span class="material-icons">search</span>
    <input type="text" [(ngModel)]="searchQuery" placeholder="Pretražite ugovore po naslovu oglasa...">
  </div>

  <section class="contract-section">
    <div class="section-header">
      <h3 class="section-title">Dolazni zahtevi</h3>
      <span class="count-badge">{{ filteredIncoming.length }}</span>
    </div>

    <div *ngIf="filteredIncoming.length > 0; else noIncoming">
      <app-contract-card
        *ngFor="let contract of filteredIncoming"
        [id]="'contract-' + contract.id"
        [contract]="contract"
        [isOwnerView]="true"
        (statusUpdated)="refreshData()">
      </app-contract-card>
    </div>
    <ng-template #noIncoming>
      <p class="empty-state">{{ searchQuery ? 'Nema rezultata pretrage.' : 'Nema dolaznih zahteva.' }}</p>
    </ng-template>
  </section>

  <section class="contract-section">
    <div class="section-header">
      <h3 class="section-title">Moji zahtevi</h3>
      <span class="count-badge">{{ filteredOutgoing.length }}</span>
    </div>

    <div *ngIf="filteredOutgoing.length > 0; else noOutgoing">
      <app-contract-card
        *ngFor="let contract of filteredOutgoing"
        [id]="'contract-' + contract.id"
        [contract]="contract"
        [isOwnerView]="false"
        (statusUpdated)="refreshData()">
      </app-contract-card>
    </div>
    <ng-template #noOutgoing>
      <p class="empty-state">{{ searchQuery ? 'Nema rezultata pretrage.' : 'Nisi poslao nijedan zahtev.' }}</p>
    </ng-template>
  </section>

</div>
