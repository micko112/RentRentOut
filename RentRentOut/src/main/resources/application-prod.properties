# ============================================================
# PRODUCTION PROFILE — sve osetljive vrednosti dolaze iz env
# Pokretanje: java -jar app.jar --spring.profiles.active=prod
# ============================================================

# --- Database ---
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:rent_rent_out}?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# --- Liquibase (NIKAD ne brisati bazu u produkciji) ---
spring.liquibase.drop-first=false

# --- Mail (pravi SMTP, ne Mailtrap) ---
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

# --- Frontend URL ---
app.frontend.url=${FRONTEND_URL}/verify-email
app.frontend.base-url=${FRONTEND_URL}

# --- VAPID (Web Push) ---
app.vapid.private-key=${VAPID_PRIVATE_KEY}

# --- Facebook OAuth ---
facebook.app-secret=${FACEBOOK_APP_SECRET}

# --- Cloudinary ---
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
