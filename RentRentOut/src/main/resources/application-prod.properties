# ============================================================
# PRODUCTION PROFILE — sve osetljive vrednosti dolaze iz env
# Pokretanje: java -jar app.jar --spring.profiles.active=prod
# ============================================================

# --- Database ---
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:rent_rent_out}?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# --- Liquibase ---
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.drop-first=false

# --- Multipart upload ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

