name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:

  test:
    name: Unit Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        working-directory: ./RentRentOut
        run: mvn test

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        working-directory: ./RentRentOut
        run: mvn clean package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: rentrentout-jar
          path: RentRentOut/target/*.jar
          retention-days: 7

  docker:
      name: Build & Push Docker Images
      runs-on: ubuntu-latest
      needs: build
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'

      permissions:
        contents: read
        packages: write

      strategy:
        matrix:
          include:
            - image: rentrentout-backend
              context: ./RentRentOut
            - image: rentrentout-frontend
              context: ./RentRentOutFront/rent-rent-out-front
            - image: rentrentout-ml
              context: ./RentRentOutML/ai_service

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Login to GHCR
          uses: docker/login-action@v3
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

        - name: Build and push
          uses: docker/build-push-action@v5
          with:
            context: ${{ matrix.context }}
            push: true
            tags: |
              ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
              ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }}
            cache-from: type=gha
            cache-to: type=gha,mode=max
